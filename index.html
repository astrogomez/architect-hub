<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Architect | 21-Day Genesis</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #050505; color: #cbd5e1; }
        .glass { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); }
        .active-day { border-color: #3b82f6; box-shadow: 0 0 20px rgba(59, 130, 246, 0.15); }
        .progress-gradient { background: linear-gradient(90deg, #3b82f6 0%, #2dd4bf 100%); }
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0a0a0a; }
        ::-webkit-scrollbar-thumb { background: #222; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #333; }
    </style>
</head>
<body class="pb-20">

    <!-- Header -->
    <header class="sticky top-0 z-50 glass border-b border-white/5 p-4 mb-8">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-blue-600 rounded-lg flex items-center justify-center shadow-lg shadow-blue-500/20">
                    <svg xmlns="http://www.w3.org/2000/svg" class="text-white w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 3v2m6-2v2M9 19v2m6-2v2M5 9H3m2 6H3m18-6h-2m2 6h-2M7 19h10a2 2 0 002-2V7a2 2 0 00-2-2H7a2 2 0 00-2 2v10a2 2 0 002 2zM9 9h6v6H9V9z" />
                    </svg>
                </div>
                <div>
                    <h1 class="text-white font-extrabold tracking-tighter uppercase text-sm leading-none">The Architect</h1>
                    <p class="text-[9px] text-blue-400 tracking-[0.3em] font-bold uppercase mt-1">Genesis Sequence</p>
                </div>
            </div>
            <div class="text-right">
                <p class="text-[9px] text-gray-500 uppercase tracking-widest mb-1">System Status</p>
                <div id="progress-text" class="text-xs font-mono text-white">Day 1 / 21</div>
            </div>
        </div>
    </header>

    <main class="max-w-4xl mx-auto px-4 space-y-10">
        
        <!-- Identity Pillars -->
        <section class="grid grid-cols-2 md:grid-cols-4 gap-3">
            <div class="glass p-4 rounded-2xl text-center">
                <p class="text-yellow-500 text-xs mb-1 font-bold">WEALTH</p>
                <p class="text-[10px] text-gray-500 uppercase">IBKR / Options</p>
            </div>
            <div class="glass p-4 rounded-2xl text-center border-green-500/20">
                <p class="text-green-400 text-xs mb-1 font-bold">PHYSICAL</p>
                <p class="text-[10px] text-gray-500 uppercase">-5kg Target</p>
            </div>
            <div class="glass p-4 rounded-2xl text-center border-red-500/20">
                <p class="text-red-400 text-xs mb-1 font-bold">IDENTITY</p>
                <p class="text-[10px] text-gray-500 uppercase">Goddard / Hicks</p>
            </div>
            <div class="glass p-4 rounded-2xl text-center border-blue-500/20">
                <p class="text-blue-400 text-xs mb-1 font-bold">STATE</p>
                <p class="text-[10px] text-gray-500 uppercase">The Fun Factor</p>
            </div>
        </section>

        <!-- The Timeline -->
        <div id="days-container" class="space-y-4">
            <!-- Days injected via JavaScript -->
        </div>

        <!-- Rules Footer -->
        <div class="glass p-6 rounded-3xl border-blue-500/20 mt-10 text-center">
            <h3 class="text-blue-400 text-[10px] font-black uppercase tracking-[0.4em] mb-4">Core Directives</h3>
            <p class="text-xs text-gray-400 italic">"The 3D is only the echo of the past. The Architect lives in the result."</p>
        </div>
    </main>

    <script>
        // CONFIGURATION: Replace these IDs with your actual Google Drive File IDs
        const DRIVE_BASE = "https://drive.google.com/uc?export=download&id=";
        const protocolData = [
            { id: 1, title: "The Code Scan", tool: "Linguistic Audit", audio: "YOUR_ID_1", pdf: "YOUR_ID_1" },
            { id: 2, title: "Mirror Audit", tool: "Biological Observe", audio: "YOUR_ID_2", pdf: "YOUR_ID_2" },
            { id: 3, title: "Scarcity Trace", tool: "Physical Awareness", audio: "YOUR_ID_3", pdf: "YOUR_ID_3" },
            { id: 4, title: "06:00 Blank Slate", tool: "No-Thingness", audio: "YOUR_ID_4", pdf: "YOUR_ID_4" },
            { id: 5, title: "Segment Intending", tool: "Abraham Hicks", audio: "YOUR_ID_5", pdf: "YOUR_ID_5" },
            { id: 6, title: "Language Purge", tool: "Hardware Test", audio: "YOUR_ID_6", pdf: "YOUR_ID_6" },
            { id: 7, title: "System Review", tool: "Main Server Audit", audio: "YOUR_ID_7", pdf: "YOUR_ID_7" },
            { id: 8, title: "Wealth Script", tool: "Neville Goddard", audio: "YOUR_ID_8", pdf: "YOUR_ID_8" },
            { id: 9, title: "Bio Sovereignty", tool: "-5kg Scripting", audio: "YOUR_ID_9", pdf: "YOUR_ID_9" },
            { id: 10, title: "The Command", tool: "Calibration Audio", audio: "YOUR_ID_10", pdf: "YOUR_ID_10" },
            { id: 11, title: "Power Anchor", tool: "High-Exertion", audio: "YOUR_ID_11", pdf: "YOUR_ID_11" },
            { id: 12, title: "Evidence Hunt", tool: "Vibrational Escrow", audio: "YOUR_ID_12", pdf: "YOUR_ID_12" },
            { id: 13, title: "Bridge of Incidence", tool: "3D Reframing", audio: "YOUR_ID_13", pdf: "YOUR_ID_13" },
            { id: 14, title: "The Master Doc", tool: "Final Command", audio: "YOUR_ID_14", pdf: "YOUR_ID_14" },
            { id: 15, title: "Identity Staging", tool: "Arrival Move", audio: "YOUR_ID_15", pdf: "YOUR_ID_15" },
            { id: 16, title: "Shadow Data", tool: "Labeling Reality", audio: "YOUR_ID_16", pdf: "YOUR_ID_16" },
            { id: 17, title: "Calibration", tool: "Radical Gratitude", audio: "YOUR_ID_17", pdf: "YOUR_ID_17" },
            { id: 18, title: "The Market Master", tool: "IBKR Coherence", audio: "YOUR_ID_18", pdf: "YOUR_ID_18" },
            { id: 19, title: "Small Win Wiring", tool: "Nervous System", audio: "YOUR_ID_19", pdf: "YOUR_ID_19" },
            { id: 20, title: "The Watcher", tool: "Total Observation", audio: "YOUR_ID_20", pdf: "YOUR_ID_20" },
            { id: 21, title: "The Architect", tool: "Legacy Deletion", audio: "YOUR_ID_21", pdf: "YOUR_ID_21" }
        ];

        let currentDay = parseInt(localStorage.getItem('architect_day')) || 1;

        function render() {
            const container = document.getElementById('days-container');
            const progressText = document.getElementById('progress-text');
            progressText.innerText = `Day ${currentDay} / 21`;
            
            container.innerHTML = protocolData.map(day => {
                const isLocked = day.id > currentDay;
                const isCurrent = day.id === currentDay;
                const isDone = day.id < currentDay;

                return `
                    <div class="glass p-5 rounded-3xl transition-all duration-500 ${isCurrent ? 'active-day scale-[1.02]' : ''} ${isLocked ? 'opacity-30' : ''}">
                        <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
                            <div class="flex items-center gap-4">
                                <div class="w-10 h-10 rounded-xl flex items-center justify-center font-black text-xs ${isCurrent ? 'bg-blue-600 text-white' : 'bg-white/5 text-gray-500'}">
                                    ${isDone ? '✓' : day.id}
                                </div>
                                <div>
                                    <h3 class="text-sm font-bold ${isLocked ? 'text-gray-500' : 'text-white'} uppercase tracking-tight">${day.title}</h3>
                                    <p class="text-[9px] text-blue-500 font-bold uppercase tracking-widest mt-1">${day.tool}</p>
                                </div>
                            </div>
                            
                            ${!isLocked ? `
                                <div class="flex gap-2 w-full md:w-auto">
                                    <a href="${DRIVE_BASE}${day.audio}" target="_blank" class="flex-1 text-center bg-blue-600 hover:bg-blue-500 text-white text-[10px] font-black uppercase py-2 px-4 rounded-lg transition-all">Audio</a>
                                    <a href="${DRIVE_BASE}${day.pdf}" target="_blank" class="flex-1 text-center bg-white/5 hover:bg-white/10 text-white text-[10px] font-black uppercase py-2 px-4 rounded-lg border border-white/5">PDF</a>
                                    ${isCurrent ? `<button onclick="completeDay(${day.id})" class="flex-1 bg-green-500/20 text-green-400 border border-green-500/30 text-[10px] font-black uppercase py-2 px-4 rounded-lg">Complete</button>` : ''}
                                </div>
                            ` : `
                                <div class="text-[10px] text-gray-600 uppercase font-bold tracking-widest flex items-center gap-2">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg> Encrypted
                                </div>
                            `}
                        </div>
                    </div>
                `;
            }).join('');
        }

        window.completeDay = (id) => {
            if (id === currentDay && currentDay < 21) {
                currentDay++;
                localStorage.setItem('architect_day', currentDay);
                render();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        };

        render();
    </script>
</body>
</html>
